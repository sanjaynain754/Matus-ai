name: Build Matus AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.33
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git python3 python3-pip \
          openjdk-17-jdk zipalign \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          libltdl-dev pkg-config autoconf automake
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses || true
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
    
    - name: Clean Buildozer Cache
      run: |
        echo "Cleaning old cache..."
        rm -rf .buildozer
        rm -rf ~/.buildozer
    
    - name: Build APK with Buildozer (FORCED PYTHON 3.10)
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        # यह सबसे जरूरी लाइन है - यह Buildozer को Python 3.10 use करने पर मजबूर करेगी
        P4A_python_version: "3.10"
        P4A_BOOTSTRAP: "sdl2"
      run: |
        echo " Starting build with Python 3.10 forced via Environment Variables..."
        # Forcefully update the spec file right before build
        sed -i 's/^requirements = .*/requirements = python3,kivy==2.3.0,cython==0.29.33,requests,pyjnius,android/' buildozer.spec
        echo "p4a.python_version = 3.10" >> buildozer.spec
        
        # Run the build
        buildozer android debug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: MatusAI-APK
        path: bin/*.apk
        retention-days: 30
