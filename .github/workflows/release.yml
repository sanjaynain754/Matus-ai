name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine
        npm install
    
    - name: Build Python package
      run: python setup.py sdist bdist_wheel
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
    
    - name: Publish to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        npm config set //registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN
        npm publish
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          MATUS ULTIMATE v${{ github.ref_name }}
          
          ## Features
          - Multi-language support (Python, C++, JavaScript, Bash, SQL)
          - Advanced penetration testing tools
          - Azure security testing
          - HackerOne integration
          - Automated reconnaissance
          - AI-powered vulnerability analysis
          
          ## Installation
          
          ### NPM
          ```bash
          npm install matus-ai
          ```
          
          ### PyPI
          ```bash
          pip install matus-ai
          ```
          
          ### Docker
          ```bash
          docker pull sanjaynain754/matus-ai:${{ github.ref_name }}
          ```
          
          ## Documentation
          - [README](https://github.com/sanjaynain754/Matus-ai/blob/main/README.md)
          - [HackerOne Guide](https://github.com/sanjaynain754/Matus-ai/blob/main/HACKERONE_GUIDE.md)
          - [Termux Setup](https://github.com/sanjaynain754/Matus-ai/blob/main/TERMUX_SETUP.md)
        draft: false
        prerelease: false
    
    - name: Build Docker image
      run: |
        docker build -t sanjaynain754/matus-ai:${{ github.ref_name }} .
        docker build -t sanjaynain754/matus-ai:latest .
    
    - name: Push Docker image
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
        docker push sanjaynain754/matus-ai:${{ github.ref_name }}
        docker push sanjaynain754/matus-ai:latest
